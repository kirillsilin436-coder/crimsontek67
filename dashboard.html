\<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CRIMSONTEK // CORE TERMINAL</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

    :root {
      --main-red: #ff0000;
      --bg-black: #050505;
      --text-gray: #b0b0b0;
      --neon-green: #00ff00;
    }

    body {
      background-color: var(--bg-black);
      color: var(--text-gray);
      font-family: 'JetBrains Mono', monospace;
      margin: 0; padding: 10px;
      overflow-x: hidden;
      display: flex; flex-direction: column;
      height: 100vh; box-sizing: border-box;
    }

    .scanline {
      width: 100%; height: 2px;
      background: rgba(255, 0, 0, 0.1);
      position: fixed; top: 0; z-index: 1000;
      animation: scan 4s linear infinite;
      pointer-events: none;
    }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

    header {
      border-bottom: 2px solid var(--main-red);
      padding-bottom: 5px; margin-bottom: 15px;
      display: flex; justify-content: space-between; align-items: center;
    }
    
    .logo { color: var(--main-red); font-size: 1.4rem; font-weight: 900; text-shadow: 0 0 10px rgba(255,0,0,0.5); }

    .card {
      background: rgba(15, 0, 0, 0.8);
      border: 1px solid #300;
      padding: 10px; margin-bottom: 10px;
      position: relative;
    }

    .card-header {
      color: var(--main-red); font-size: 0.75rem; font-weight: bold;
      border-bottom: 1px dashed #400; padding-bottom: 5px; margin-bottom: 8px;
    }

    /* Консоль */
    .terminal-box {
      background: #000; height: 160px;
      overflow-y: auto; font-size: 0.75rem;
      padding: 8px; border: 1px solid #222;
    }
    .t-gray { color: #666; }
    .t-red { color: var(--main-red); }
    .t-green { color: var(--neon-green); }
    .t-orange { color: #ffae00; }

    /* Модули */
    .modules-list { display: flex; flex-direction: column; gap: 8px; }
    .module-btn {
      background: transparent; border: 1px solid #333;
      color: #fff; padding: 14px; font-family: inherit;
      font-size: 0.9rem; text-align: left; cursor: pointer;
      display: flex; justify-content: space-between; opacity: 0.5;
      pointer-events: none; transition: 0.3s;
    }
    .module-btn.active { opacity: 1; pointer-events: auto; border-color: var(--main-red); }
    .module-btn:active { background: var(--main-red); color: #000; }
  </style>
</head>
<body>
  <div class="scanline"></div>

  <header>
    <div class="logo">CRIMSONTEK</div>
    <div style="font-size: 0.7rem; text-align: right;">NODE: RED_MAGIC_10<br>OS: v0.8.4</div>
  </header>

  <div class="card">
    <div class="card-header">SYSTEM_BOOT_LOG</div>
    <div class="terminal-box" id="console"></div>
  </div>

  <div class="card">
    <div class="card-header">AVAILABLE_MODULES</div>
    <div class="modules-list">
      <button class="module-btn" id="btn-1" onclick="exec('phone_scan.py')"><span>> phone_scan.py</span><span>[LOCKED]</span></button>
      <button class="module-btn" id="btn-2" onclick="exec('ip_scan.py')"><span>> ip_scan.py</span><span>[LOCKED]</span></button>
      <button class="module-btn" id="btn-3" onclick="exec('mail_scan.py')"><span>> mail_scan.py</span><span>[LOCKED]</span></button>
    </div>
  </div>

  <script>
    const logs = [
      { t: "[SYSTEM] Инициализация ядра Crimsontek...", c: "t-gray" },
      { t: "[BOOT] Загрузка биометрического модуля...", c: "t-gray" },
      { t: "[STATUS] Доступ к модулям Network Scan и OSINT открыт", c: "t-green" },
      { t: "[WARNING] Уровень угрозы: MEDIUM", c: "t-orange" },
      { t: "[OK] Подключение к CrimsonNet установлено", c: "t-green" },
      { t: "[BIO] Биометрический сканер активирован", c: "t-red" },
      { t: "[SYSTEM] Ожидание команды оператора...", c: "t-white" }
    ];

    const consoleBox = document.getElementById('console');
    let index = 0;

    function printLogs() {
      if (index < logs.length) {
        const p = document.createElement('p');
        p.className = logs[index].c;
        p.innerHTML = logs[index].t;
        consoleBox.appendChild(p);
        consoleBox.scrollTop = consoleBox.scrollHeight;
        index++;
        setTimeout(printLogs, 600);
      } else {
        // Активируем кнопки после завершения логов
        document.querySelectorAll('.module-btn').forEach(btn => {
          btn.classList.add('active');
          btn.lastChild.innerText = "[READY]";
        });
      }
    }

    function exec(cmd) {
      const p = document.createElement('p');
      p.className = "t-red";
      p.innerHTML = `> RUNNING: ${cmd}... ACCESSING DATA`;
      consoleBox.appendChild(p);
      consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    window.onload = printLogs;
  </script>
</body>
</html>
