<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRIMSONTEK // HUB</title>
    <style>
        :root { --red: #ff0000; --green: #00ff00; --cyan: #00ffff; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; text-transform: uppercase; }
        
        .terminal { border: 2px solid var(--red); padding: 10px; background: #050000; margin-bottom: 15px; box-shadow: 0 0 10px rgba(255,0,0,0.5); }
        #output { height: 180px; overflow-y: auto; color: var(--green); font-size: 11px; border: 1px solid #111; padding: 5px; margin-bottom: 10px; }
        
        .input-line { display: flex; gap: 5px; }
        input { flex: 1; background: #000; border: 1px solid var(--red); color: #fff; padding: 12px; outline: none; font-size: 16px; font-family: inherit; }
        button { background: var(--red); color: #000; border: none; padding: 10px; font-weight: bold; }
        
        .section-title { color: var(--red); font-size: 10px; margin: 15px 0 5px 0; border-bottom: 1px solid #333; letter-spacing: 2px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn { border: 1px solid var(--red); color: var(--red); text-decoration: none; padding: 15px; text-align: center; font-size: 10px; font-weight: bold; display: block; }
        .btn:active { background: var(--red); color: #000; }

        @media (max-width: 450px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div style="font-size: 10px; color: var(--red); margin-bottom: 5px;">HUB_OPERATOR: <span id="op">GHOST</span></div>
    
    <div class="terminal">
        <div id="output">/ CRIMSONTEK_OS_V3.5 ONLINE...<br>/ ВСЕ ВАШИ МОДУЛИ ПОДКЛЮЧЕНЫ.</div>
        <div class="input-line">
            <input type="text" id="cmd" placeholder="ВВЕДИТЕ КОМАНДУ...">
            <button onclick="run()">EXE</button>
        </div>
    </div>

    <div class="section-title">[ ВАШИ_ИНЖЕНЕРНЫЕ_ПРОГРАММЫ ]</div>
    <div class="grid">
        <a href="strobe.html" class="btn">ТАХОМЕТР (STROBE)</a>
        <a href="GForce.html" class="btn">G-FORCE ЛАБА</a>
        <a href="scan_mobile.html" class="btn">ДЕФЕКТОСКОП (SCAN)</a>
        <a href="sopromat.html" class="btn">SOPROMAT_3D</a>
    </div>

    <div class="section-title">[ СЕТЕВЫЕ_УТИЛИТЫ ]</div>
    <div class="grid">
        <a href="phone_scan.html" class="btn">PH_SCANNER</a>
        <a href="https://t.me/+QT-yF6yZIXY2MzA6" target="_blank" class="btn" style="color:var(--cyan); border-color:var(--cyan);">SECURE_CHAT</a>
    </div>

    <script>
        document.getElementById('op').innerText = (localStorage.getItem('c_user') || "OPERATOR").toUpperCase();
        
        async function run() {
            const out = document.getElementById('output');
            const inp = document.getElementById('cmd');
            if(!inp.value) return;
            out.innerHTML += `<div>> ${inp.value}</div>`;
            
            // Запрос к ИИ для инженерных подсказок
            try {
                const res = await fetch("https://api.airforce/chat/completions", {
                    method: "POST", headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({model:"llama-3-70b-instruct", messages:[{role:"system",content:"Ты ИИ CRIMSONTEK. Отвечай как терминал."}, {role:"user",content:inp.value}]})
                });
                const d = await res.json();
                out.innerHTML += `<div style="color:var(--cyan)">AI: ${d.choices[0].message.content}</div>`;
            } catch(e) { out.innerHTML += `<div style="color:var(--red)">ERROR: ИИ ВРЕМЕННО НЕДОСТУПЕН</div>`; }
            
            inp.value = ""; out.scrollTop = out.scrollHeight;
        }
    </script>
</body>
</html>
