
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB</title>
    <style>
        /* МИНИМАЛЬНЫЙ СТИЛЬ ПРЯМО ЗДЕСЬ */
        body { background: #000; color: #f00; font-family: monospace; margin: 0; padding: 20px; }
        .terminal { border: 2px solid #f00; padding: 15px; background: #050000; box-shadow: 0 0 10px #f00; }
        .header { border-bottom: 1px solid #f00; margin-bottom: 15px; padding-bottom: 5px; font-weight: bold; }
        #output { height: 200px; overflow-y: auto; color: #0f0; margin-bottom: 10px; font-size: 12px; }
        .input-line { display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #f00; color: #fff; padding: 10px; font-family: inherit; }
        button { background: #f00; color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer; }
        .links { margin-top: 20px; display: grid; grid-template-columns: 1fr; gap: 10px; }
        .btn { border: 1px solid #f00; color: #f00; text-decoration: none; padding: 15px; text-align: center; display: block; }
    </style>
</head>
<body>

    <div class="terminal">
        <div class="header">CRIMSONTEK_OS_V3</div>
        <div id="output">/ SYSTEM_READY...<br>/ WAITING_FOR_INPUT...</div>
        <div class="input-line">
            <input type="text" id="cmd" placeholder="ENTER CMD">
            <button onclick="run()">EXE</button>
        </div>
    </div>

    <div class="links">
        <a href="scan_mobile.html" class="btn">PH_SCANNER</a>
        <a href="https://t.me/+QT-yF6yZIXY2MzA6" class="btn" style="color:#0ff; border-color:#0ff;">SECURE_CHAT</a>
    </div>

    <script>
        // САМЫЙ ПРОСТОЙ СКРИПТ - БЕЗ СЕТЕВЫХ ЗАПРОСОВ ДЛЯ ПРОВЕРКИ
        function run() {
            const out = document.getElementById('output');
            const inp = document.getElementById('cmd');
            if(inp.value) {
                out.innerHTML += `<div style="color:#fff">> ${inp.value}</div>`;
                
                // Простая заглушка вместо ИИ для теста отрисовки
                setTimeout(() => {
                    out.innerHTML += `<div style="color:#0ff">AI: COMMAND_RECEIVED. UPDATING...</div>`;
                    out.scrollTop = out.scrollHeight;
                }, 500);
                
                inp.value = "";
            }
        }
    </script>
</body>
</html>
