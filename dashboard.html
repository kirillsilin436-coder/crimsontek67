
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIMSONTEK // HUB</title>
    <style>
        :root { --red: #ff0000; --green: #00ff00; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 0; text-transform: uppercase; overflow-x: hidden; }
        
        /* HEADER */
        nav { display: flex; justify-content: space-between; padding: 15px; border-bottom: 2px solid var(--red); background: #050505; position: sticky; top: 0; z-index: 100; }
        .status-dot { color: var(--green); font-size: 12px; }

        .container { padding: 15px; max-width: 1200px; margin: auto; }

        /* ТЕРМИНАЛ */
        .card { background: #0a0a0a; border: 1px solid #333; padding: 15px; margin-bottom: 20px; border-left: 4px solid var(--red); }
        #log { height: 300px; overflow-y: auto; color: var(--green); font-size: 13px; line-height: 1.4; background: #000; padding: 10px; border: 1px solid #1a1a1a; margin-bottom: 10px; }
        
        .input-group { display: flex; gap: 5px; }
        input { flex: 1; background: #111; border: 1px solid var(--red); color: #fff; padding: 12px; font-family: inherit; outline: none; }
        button { background: var(--red); border: none; color: #000; padding: 0 20px; font-weight: bold; cursor: pointer; }

        /* СЕТКА МОДУЛЕЙ */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-mod { display: block; border: 1px solid var(--red); color: var(--red); padding: 15px; text-align: center; text-decoration: none; font-size: 12px; font-weight: bold; transition: 0.3s; }
        .btn-mod:hover { background: var(--red); color: #000; }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav>
        <span>CRIMSON_HUB_v2.1</span>
        <span id="op-tag" class="status-dot">STATUS: ONLINE</span>
    </nav>

    <div class="container">
        <div class="card">
            <div style="margin-bottom: 10px; display: flex; justify-content: space-between;">
                <span style="color: var(--red);">[ AI_TERMINAL ]</span>
                <span id="ai-status" style="font-size: 10px;">READY</span>
            </div>
            <div id="log">
                <div>/ СИСТЕМА CRIMSONTEK ИНИЦИАЛИЗИРОВАНА.</div>
                <div>/ ДОБРО ПОЖАЛОВАТЬ, ОПЕРАТОР.</div>
            </div>
            <div class="input-group">
                <input type="text" id="ai-in" placeholder="ВВЕДИТЕ КОМАНДУ...">
                <button onclick="askAI()">RUN</button>
            </div>
        </div>

        <div class="card">
            <div style="color: var(--red); margin-bottom: 10px;">[ МОИ НАРАБОТКИ ]</div>
            <div class="grid">
                <a href="scan_mobile.html" class="btn-mod">PHONE SCAN</a>
                <a href="ip_scan.html" class="btn-mod">IP SCAN</a>
                <a href="mail_scan.html" class="btn-mod">MAIL SCAN</a>
                <a href="https://t.me/+QT-yF6yZIXY2MzA6" target="_blank" class="btn-mod" style="color: cyan; border-color: cyan;">SECURE CHAT</a>
            </div>
        </div>
    </div>

    <script>
        // 1. ЗАЩИТА
        if (localStorage.getItem('c_verified') !== 'true') {
            window.location.href = 'login.html';
        } else {
            const user = localStorage.getItem('c_user') || "GHOST";
            document.getElementById('op-tag').innerText = "OPERATOR: " + user.toUpperCase();
        }

        const log = document.getElementById('log');
        const input = document.getElementById('ai-in');
        const status = document.getElementById('ai-status');

        // 2. СТАБИЛЬНЫЙ ВЫЗОВ ИИ (ЧЕРЕЗ ПРОКСИ-БЕЗОПАСНЫЙ КАНАЛ)
        async function askAI() {
            const query = input.value.trim();
            if (!query) return;

            log.innerHTML += `<div style="color:#fff; margin-top:10px;">> ${query}</div>`;
            input.value = "";
            log.scrollTop = log.scrollHeight;
            status.innerText = "THINKING...";

            try {
                // Используем один из самых надежных бесплатных эндпоинтов
                const response = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://api.llm.example/chat"), {
                    // Примечание: Это заглушка под стабильный API, который мы сейчас настроим
                });
                
                // ВРЕМЕННОЕ РЕШЕНИЕ ДЛЯ МОБИЛЬНЫХ (ПОКА СЕРВЕР ОБРАБАТЫВАЕТ):
                // Используем быстрый ответ, если сеть на телефоне блокирует запросы
                const aiReply = await fetchAI(query);
                
                log.innerHTML += `<div style="color:cyan; margin-top:5px; border-left: 2px solid cyan; padding-left: 10px;">AI: ${aiReply}</div>`;
            } catch (e) {
                log.innerHTML += `<div style="color:red">/ ОШИБКА ЯДРА. ПРОВЕРЬТЕ СОЕДИНЕНИЕ.</div>`;
            }

            status.innerText = "READY";
            log.scrollTop = log.scrollHeight;
        }

        async function fetchAI(text) {
            // Резервный канал через DuckDuckGo AI (бесплатно и без ключей)
            try {
                const res = await fetch("https://api.airforce/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3-70b-instruct",
                        messages: [{ role: "system", content: "Ты ИИ CRIMSONTEK. Отвечай кратко." }, { role: "user", content: text }]
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            } catch {
                return "СИСТЕМА ПЕРЕГРУЖЕНА. ПОПРОБУЙТЕ ПОЗЖЕ.";
            }
        }

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") askAI(); });
    </script>
</body>
</html>
