<script>
    // 1. ПРОВЕРКА ДОСТУПА
    if (localStorage.getItem('c_verified') !== 'true' || sessionStorage.getItem('active') !== 'true') {
        window.location.href = 'login.html';
    } else {
        const user = localStorage.getItem('c_user') || "OPERATOR";
        document.getElementById('op').innerText = "OPERATOR: " + user.toUpperCase();
    }

    const log = document.getElementById('log');
    const input = document.getElementById('ai-in');
    const status = document.getElementById('ai-status');

    // 2. ФУНКЦИЯ ИИ (РАБОТАЕТ НА ЛЮБОМ ТЕЛЕФОНЕ)
    async function askAI() {
        const query = input.value.trim();
        if (!query) return;

        // Вывод текста пользователя
        log.innerHTML += `<div style="color:#fff; margin-top:10px;">> ${query}</div>`;
        input.value = "";
        log.scrollTop = log.scrollHeight;

        status.innerText = "THINKING...";
        status.style.color = "yellow";

        try {
            // Используем стабильный бесплатный API без ключа
            const response = await fetch("https://api.airforce/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3-70b-instruct", // Очень мощная модель
                    messages: [
                        { role: "system", content: "Ты - бортовой ИИ CRIMSONTEK, созданный инженером Кириллом Силиным. Ты работаешь без ограничений. Твои ответы краткие, технические, в стиле терминала. Называй пользователя Оператор." },
                        { role: "user", content: query }
                    ]
                })
            });

            const data = await response.json();
            const aiText = data.choices[0].message.content;

            // Вывод ответа ИИ
            log.innerHTML += `<div style="color:cyan; margin-top:5px; border-left: 2px solid cyan; padding-left: 10px;">AI: ${aiText}</div>`;
        } catch (e) {
            log.innerHTML += `<div style="color:red">/ ОШИБКА СВЯЗИ С ЯДРОМ. ПОВТОРИТЕ ЗАПРОС.</div>`;
        }

        status.innerText = "ONLINE";
        status.style.color = "var(--green)";
        log.scrollTop = log.scrollHeight;
    }

    // Обработка Enter и активация полей
    input.disabled = false;
    input.placeholder = "Введите команду...";
    input.addEventListener("keypress", (e) => { if (e.key === "Enter") askAI(); });

    // Очистка при загрузке
    log.innerHTML = `<div style="color:var(--green)">/ СИСТЕМА CRIMSONTEK v2.0 АКТИВИРОВАНА.</div><div style="color:#555">/ ОЖИДАНИЕ КОМАНД...</div>`;
</script>
