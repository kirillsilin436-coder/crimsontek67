<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIMSONTEK // HUB</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body { background: #050505; color: #bbb; font-family: monospace; margin: 0; }
        .nav { background: #000; border-bottom: 2px solid #f00; padding: 15px; display: flex; justify-content: space-between; }
        .container { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: rgba(20,0,0,0.9); border: 1px solid #300; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: 1px solid #f00; color: #f00; padding: 12px; text-align: center; text-decoration: none; font-size: 0.7rem; }
        .chat-box { background: #000; height: 200px; overflow-y: auto; padding: 10px; border: 1px solid #222; margin-bottom: 10px; }
        .chat-input { display: flex; gap: 5px; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 10px; border: none; }
        .send { background: #f00; color: #fff; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="nav">
        <div style="color:#f00; font-weight:bold;">CRIMSONTEK HUB</div>
        <div style="color:#0f0; font-size:0.7rem;">SYSTEM: ONLINE</div>
    </div>

    <div class="container">
        <div class="card">
            <div style="color:#f00; font-size:0.8rem; margin-bottom:10px;">ENGINEERING LAB</div>
            <div class="grid">
                <a href="strobe.html" class="btn">STROBOSCOPE</a>
                <a href="GForce.html" class="btn">G-FORCE LAB</a>
                <a href="scan_mobile.html" class="btn">ACOUSTIC SCAN</a>
                <a href="#" class="btn" onclick="alert('AI в разработке')">AI ASSISTANT</a>
            </div>
        </div>

        <div class="card">
            <div style="color:#f00; font-size:0.8rem; margin-bottom:10px;">GLOBAL CHAT</div>
            <div class="chat-box" id="chat"></div>
            <div class="chat-input">
                <input type="text" id="msg" placeholder="Сообщение...">
                <button class="send" onclick="send()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        // ВСТАВЬ СЮДА ТОТ ЖЕ CONFIG FIREBASE
        const firebaseConfig = { /* Твой конфиг */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const userPhone = localStorage.getItem('user_phone') || "Guest";

        function send() {
            const text = document.getElementById('msg').value;
            if(text) {
                db.collection("global_messages").add({
                    user: userPhone,
                    text: text,
                    time: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('msg').value = '';
            }
        }

        // Слушаем чат в реальном времени (он станет общим для всех)
        db.collection("global_messages").orderBy("time", "asc").onSnapshot(snap => {
            const chat = document.getElementById('chat');
            chat.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                chat.innerHTML += `<div><span style="color:#0f0">[${m.user}]:</span> ${m.text}</div>`;
            });
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
