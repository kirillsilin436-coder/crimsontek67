<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRIMSONTEK // HUB</title>
    <style>
        :root { --red: #ff0000; --green: #00ff00; --cyan: #00ffff; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: monospace; margin: 0; padding: 10px; text-transform: uppercase; }
        .terminal { border: 2px solid var(--red); padding: 12px; background: #050000; margin-bottom: 15px; }
        #output { height: 220px; overflow-y: auto; color: var(--green); font-size: 11px; border: 1px solid #111; padding: 5px; margin-bottom: 10px; }
        .input-line { display: flex; gap: 5px; }
        input { flex: 1; background: #000; border: 1px solid var(--red); color: #fff; padding: 12px; outline: none; font-size: 16px; font-family: inherit; }
        button { background: var(--red); color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { border: 1px solid var(--red); color: var(--red); text-decoration: none; padding: 12px; text-align: center; font-size: 10px; font-weight: bold; }
        @media (max-width: 450px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div style="font-size: 10px; color: var(--red); margin-bottom: 5px;">HUB_OPERATOR: <span id="op">GHOST</span></div>
    <div class="terminal">
        <div id="output">/ CRIMSONTEK_HUB ЗАГРУЖЕН...</div>
        <div class="input-line">
            <input type="text" id="cmd" placeholder="ЗАПРОС ИИ...">
            <button onclick="run()">EXE</button>
        </div>
    </div>
    <div style="color:var(--red); font-size:10px; margin-bottom:10px;">[ МОИ_ПРОГРАММЫ ]</div>
    <div class="grid">
        <a href="sopromat.html" class="btn">SOPROMAT_3D</a>
        <a href="phone_scan.html" class="btn">PHONE_SCANNER</a>
        <a href="ip_scan.html" class="btn">IP_TRACKER</a>
        <a href="https://t.me/+QT-yF6yZIXY2MzA6" target="_blank" class="btn" style="color:var(--cyan); border-color:var(--cyan);">TG_SECURE_CHAT</a>
    </div>
    <script>
        document.getElementById('op').innerText = (localStorage.getItem('c_user') || "OPERATOR").toUpperCase();
        async function run() {
            const out = document.getElementById('output');
            const inp = document.getElementById('cmd');
            const val = inp.value; if(!val) return;
            out.innerHTML += `<div>> ${val}</div>`;
            inp.value = "";
            try {
                const res = await fetch("https://api.airforce/chat/completions", {
                    method: "POST", headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({model:"llama-3-70b-instruct", messages:[{role:"system",content:"Ты ИИ CRIMSONTEK."}, {role:"user",content:val}]})
                });
                const d = await res.json();
                out.innerHTML += `<div style="color:var(--cyan)">AI: ${d.choices[0].message.content}</div>`;
            } catch(e) { out.innerHTML += `<div style="color:var(--red)">ERROR</div>`; }
            out.scrollTop = out.scrollHeight;
        }
    </script>
</body>
</html>
