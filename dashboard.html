<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>CRIMSONTEK // HUB</title>
    <style>
        :root { --red: #f00; --green: #0f0; }
        body { background: #000; color: #fff; font-family: monospace; margin: 0; text-transform: uppercase; }
        nav { display: flex; justify-content: space-between; padding: 15px; border-bottom: 2px solid var(--red); background: #050505; }
        .container { padding: 20px; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .card { background: #080808; border: 1px solid #222; padding: 15px; margin-bottom: 20px; }
        .btn { display: block; border: 1px solid var(--red); color: var(--red); padding: 10px; text-align: center; text-decoration: none; font-size: 12px; margin-top: 10px; font-weight: bold; }
        .btn:hover { background: var(--red); color: #000; }
        #log { height: 250px; overflow-y: auto; color: var(--green); border: 1px solid #111; padding: 10px; font-size: 12px; }
        input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; margin-top: 10px; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>
    <nav>
        <span>CRIMSON_HUB_v2</span>
        <span id="op" style="color:var(--green)">OPERATOR: ...</span>
    </nav>
    <div class="container">
        <main>
            <div class="card">
                <div style="color:var(--red)">> AI_TERMINAL</div>
                <div id="log">> ЯДРО ЗАГРУЖЕНО. ЖДУ КОМАНД.</div>
                <input type="text" id="ai-in" placeholder="ЗАПРОС...">
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <a href="scan_mobile.html" class="btn">ACOUSTIC</a>
                <a href="GForce.html" class="btn">G-FORCE</a>
                <a href="strobe.html" class="btn">STROBE</a>
                <a href="https://t.me/+QT-yF6yZIXY2MzA6" target="_blank" class="btn" style="border-color:cyan;color:cyan;">CHAT</a>
            </div>
        </main>
        <aside>
            <div class="card">
                <div style="color:var(--red)">STATUS</div>
                <p style="font-size:10px;">DEV: SILIN KIRILL<br>SYSTEM: VERIFIED</p>
                <button onclick="localStorage.clear();location.reload();" style="background:none;border:none;color:#444;text-decoration:underline;cursor:pointer;font-size:9px;">RESET_ALL</button>
            </div>
        </aside>
    </div>
    <script>
        if (localStorage.getItem('c_verified') !== 'true' || sessionStorage.getItem('active') !== 'true') {
            window.location.href = 'login.html';
        } else {
            document.getElementById('op').innerText = "OPERATOR: " + localStorage.getItem('c_user').toUpperCase();
        }
        const input = document.getElementById('ai-in'), log = document.getElementById('log');
        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                log.innerHTML += `<div>> ${input.value}</div>`;
                let r = "ERROR: UNKNOWN_CMD";
                if(input.value.toLowerCase().includes('help')) r = "CMDS: STATUS, LAB, CLEAR";
                setTimeout(()=> { log.innerHTML += `<div style="color:cyan">AI: ${r}</div>`; log.scrollTop = log.scrollHeight; }, 300);
                input.value = "";
            }
        });
    </script>
</body>
</html>
