<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIMSONTEK // CORE</title>
    <style>
        :root { --red: #ff0000; --bg: #000; --green: #0f0; }
        body { background: var(--bg); color: #fff; font-family: monospace; margin: 0; text-transform: uppercase; }
        nav { display: flex; justify-content: space-between; padding: 10px 20px; border-bottom: 2px solid var(--red); background: #050505; }
        .container { padding: 20px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .card { background: #080808; border: 1px solid #222; padding: 15px; margin-bottom: 20px; }
        .btn { display: block; border: 1px solid var(--red); color: var(--red); padding: 10px; text-align: center; text-decoration: none; font-size: 12px; margin-bottom: 5px; }
        .btn:hover { background: var(--red); color: #000; }
        #ai-log { height: 300px; overflow-y: auto; color: var(--green); font-size: 12px; border: 1px solid #111; padding: 10px; margin-bottom: 10px; }
        input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 10px; box-sizing: border-box; font-family: inherit; outline: none; }
    </style>
</head>
<body>
    <nav>
        <span>CRIMSONTEK HUB</span>
        <span id="user-tag" style="color:var(--green)">WAITING...</span>
    </nav>

    <div class="container">
        <main>
            <div class="card">
                <div style="color:var(--red); margin-bottom:10px;">AI_ASSISTANT v1.0</div>
                <div id="ai-log">> ЯДРО ЗАГРУЖЕНО. ЖДУ КОМАНД...</div>
                <input type="text" id="ai-in" placeholder="Введите команду (HELP)...">
            </div>

            <div class="card">
                <div style="color:var(--red); margin-bottom:10px;">ACTIVE_LAB</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <a href="scan_mobile.html" class="btn">ACOUSTIC SCAN</a>
                    <a href="GForce.html" class="btn">G-FORCE</a>
                    <a href="strobe.html" class="btn">STROBOSCOPE</a>
                    <a href="https://t.me/+QT-yF6yZIXY2MzA6" target="_blank" class="btn" style="border-color:cyan; color:cyan;">TELEGRAM CHAT</a>
                </div>
            </div>
        </main>

        <aside>
            <div class="card">
                <div style="color:var(--red); margin-bottom:10px;">SYSTEM_INFO</div>
                <p style="font-size:10px; color:#666;">DEVELOPER: STUDENT SILIN KIRILL<br>DOMAINS: MECHANICS, HYDRAULICS, SOPROMAT<br>STATUS: ENCRYPTED</p>
            </div>
        </aside>
    </div>

    <script>
        // ПРОВЕРКА БИОМЕТРИИ
        if (localStorage.getItem('crimson_verified') !== 'true') {
            alert("ДОСТУП ЗАПРЕЩЕН. ПРОЙДИТЕ БИОМЕТРИЮ.");
            window.location.href = 'login.html';
        } else {
            const user = localStorage.getItem('crimson_user') || "GUEST";
            document.getElementById('user-tag').innerText = "OPERATOR: " + user.toUpperCase();
        }

        // ЛОГИКА ИИ
        const input = document.getElementById('ai-in');
        const log = document.getElementById('ai-log');

        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                const cmd = input.value.toLowerCase();
                log.innerHTML += `<div style="color:#fff">> ${cmd}</div>`;
                
                let res = "КОМАНДА НЕИЗВЕСТНА.";
                if(cmd.includes('help')) res = "ДОСТУПНО: STATUS, SCAN, CLEAR.";
                if(cmd.includes('status')) res = "СИСТЕМА СТАБИЛЬНА. ВСЕ МОДУЛИ ВКЛЮЧЕНЫ.";
                
                setTimeout(() => {
                    log.innerHTML += `<div style="color:cyan">AI: ${res}</div>`;
                    log.scrollTop = log.scrollHeight;
                }, 400);
                input.value = "";
            }
        });
    </script>
</body>
</html>
