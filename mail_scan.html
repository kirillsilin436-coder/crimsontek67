<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIMSONTEK // MAIL_SCAN</title>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; padding: 20px; text-transform: uppercase; }
        .terminal { border: 1px solid #0f0; padding: 15px; background: #000500; height: 300px; overflow-y: auto; margin-bottom: 15px; font-size: 11px; }
        input { background: #000; border: 1px solid #0f0; color: #fff; padding: 10px; width: 70%; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 10px; font-weight: bold; }
        .back { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 10px; }
    </style>
</head>
<body>
    <h3>[ MODULE: MAIL_SCANNER ]</h3>
    <div class="terminal" id="out">/ ВВЕДИТЕ EMAIL ДЛЯ ПРОВЕРКИ...</div>
    <input type="email" id="mail" placeholder="admin@mail.com">
    <button onclick="mailScan()">EXE</button>
    <a href="dashboard.html" class="back">&lt;-- BACK_TO_HUB</a>

    <script>
        function mailScan() {
            const out = document.getElementById('out');
            const m = document.getElementById('mail').value;
            out.innerHTML += `<br>> ПРОВЕРКА: ${m}...`;
            setTimeout(() => { out.innerHTML += `<br>> СКАНИРОВАНИЕ DARKNET БАЗ...`; }, 1500);
            setTimeout(() => { out.innerHTML += `<br>> УТЕЧЕК НЕ ОБНАРУЖЕНО. ПОЧТА БЕЗОПАСНА.`; }, 3000);
        }
    </script>
</body>
</html>
