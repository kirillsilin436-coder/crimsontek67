<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CRIMSONTEK // OFFICIAL_MEDIA</title>
  <link rel="stylesheet" href="crimson-theme.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 12px; font-size: 10px; text-transform: uppercase; }
    .wrap { max-width: 720px; margin: 0 auto; position: relative; z-index: 1; }
    h1 { font-size: 12px; letter-spacing: 4px; color: #f00; margin: 0 0 6px 0; }
    .sub { font-size: 9px; color: #800; text-transform: none; margin-bottom: 14px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .card {
      border: 1px solid #f00;
      background: rgba(8, 0, 0, 0.85);
      padding: 10px;
      box-shadow: 0 0 12px rgba(255,0,0,0.15);
    }
    .card .cap {
      font-size: 10px;
      color: #f00;
      text-transform: none;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .card video, .card img {
      width: 100%;
      max-height: 280px;
      object-fit: contain;
      background: #000;
      border: 1px solid #300;
    }
    .card .tag { font-size: 8px; color: #0ff; margin-bottom: 6px; }
    .empty { border: 1px dashed #400; padding: 24px; text-align: center; color: #600; text-transform: none; }
    a.back { color: #800; font-size: 9px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>OFFICIAL_MEDIA</h1>
    <p class="sub">Канал владельца: ролики, фото и GIF. Добавлять контент может только тот, у кого есть секретный ключ (страница admin_media).</p>
    <div id="root"></div>
    <p style="margin-top:16px;"><a class="back" href="dashboard.html">&lt;— HUB</a></p>
  </div>

  <script src="crimson-media-db.js"></script>
  <script>
    if (localStorage.getItem('c_verified') !== 'true') { window.location.href = 'index.html'; }

    var urls = [];

    function render() {
      crimsonMediaList().then(function (items) {
        var root = document.getElementById('root');
        urls.forEach(function (u) { try { URL.revokeObjectURL(u); } catch (e) {} });
        urls = [];
        if (!items.length) {
          root.innerHTML = '<div class="empty">ЛЕНТА ПУСТА — ВЛАДЕЛЕЦ ЕЩЁ НИЧЕГО НЕ ДОБАВИЛ.</div>';
          return;
        }
        root.innerHTML = '<div class="grid">' + items.map(function (it) {
          var url = URL.createObjectURL(it.blob);
          urls.push(url);
          var media = it.type === 'video'
            ? '<video src="' + url + '" controls playsinline preload="metadata"></video>'
            : '<img src="' + url + '" alt="">';
          return '<div class="card">' +
            '<div class="tag">' + it.type.toUpperCase() + ' · ' + new Date(it.t).toLocaleString() + '</div>' +
            (it.caption ? '<div class="cap">' + escapeHtml(it.caption) + '</div>' : '') +
            media + '</div>';
        }).join('') + '</div>';
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    window.addEventListener('beforeunload', function () {
      urls.forEach(function (u) { try { URL.revokeObjectURL(u); } catch (e) {} });
    });

    render();
  </script>
</body>
</html>
