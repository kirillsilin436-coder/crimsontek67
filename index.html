<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIMSONTEK // ACCESS</title>
    <style>
        body { background: #000; color: #f00; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .login-card { border: 2px solid #f00; padding: 30px; background: #050000; box-shadow: 0 0 20px #f00; text-align: center; width: 90%; max-width: 400px; }
        input { background: #000; border: 1px solid #f00; color: #fff; padding: 15px; width: 100%; box-sizing: border-box; margin-bottom: 20px; outline: none; font-family: inherit; }
        button { background: #f00; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; width: 100%; font-family: inherit; }
        .glitch { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-shadow: 2px 2px #500; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="glitch">SYSTEM_ACCESS_v3</div>
        <input type="text" id="username" placeholder="IDENTIFY_OPERATOR">
        <button onclick="enter()">INITIALIZE</button>
    </div>
    <script>
        function enter() {
            const user = document.getElementById('username').value;
            if(user) {
                localStorage.setItem('c_user', user);
                localStorage.setItem('c_verified', 'true');
                window.location.href = 'dashboard.html';
            }
        }
    </script>
</body>
</html>
