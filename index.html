<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRIMSONTEK // BIO-PUNK OS</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="terminal-header">
      <span class="status">● SYSTEM ONLINE</span>
      <span class="logo">CRIMSONTEK</span>
      <span class="version">v0.8.4 // BIO-PUNK CORE</span>
    </div>
  </header>

  <div class="hero">
    <div class="scanline"></div>
    
    <h1 class="main-title">CRIMSONTEK CORE</h1>
    <h2 class="subtitle">INITIALIZING...</h2>

    <div class="terminal-log" id="terminal-log"></div>

    <a href="login.html" class="enter-btn">ВХОД В СИСТЕМУ // BIOMETRIC AUTH</a>
  </div>

  <script>
    const logs = [
      "[SYSTEM] Инициализация ядра Crimsontek...",
      "[BOOT] Загрузка биометрического модуля...",
      "[STATUS] Доступ к модулям Network Scan и OSINT открыт",
      "[WARNING] Уровень угрозы: MEDIUM",
      "[OK] Подключение к CrimsonNet установлено",
      "[BIO] Биометрический сканер активирован",
      "[SYSTEM] Ожидание подтверждения личности..."
    ];

    const logContainer = document.getElementById('terminal-log');
    let index = 0;

    function addLogLine() {
      if (index >= logs.length) {
        setTimeout(() => {
          document.querySelector('.enter-btn').style.opacity = '1';
        }, 600);
        return;
      }

      const line = document.createElement('div');
      line.className = 'log-line';
      line.textContent = logs[index];
      logContainer.appendChild(line);

      setTimeout(() => {
        line.style.opacity = '1';
      }, 50);

      index++;
      const delay = Math.random() * 500 + 700;
      setTimeout(addLogLine, delay);
    }

    window.onload = () => {
      setTimeout(addLogLine, 800);
    };
  </script>
</body>
</html>
