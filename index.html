<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIMSONTEK // LOGIN</title>
    <style>
        body { background: #000; color: #f00; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { border: 2px solid #f00; padding: 30px; background: #050000; box-shadow: 0 0 20px #f00; text-align: center; width: 85%; }
        input { background: #000; border: 1px solid #f00; color: #fff; padding: 15px; width: 100%; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        button { background: #f00; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="margin-top:0">ACCESS_REQUIRED</h2>
        <input type="text" id="user" placeholder="OPERATOR_ID">
        <button onclick="auth()">INITIALIZE</button>
    </div>
    <script>
        function auth() {
            const name = document.getElementById('user').value;
            if(name) {
                localStorage.setItem('c_user', name);
                window.location.href = 'dashboard.html';
            }
        }
    </script>
</body>
</html>
