<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOPROMAT_3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { background: #000; color: #ffd700; font-family: monospace; margin: 0; padding: 10px; }
        #render { width: 100%; height: 200px; border: 1px solid #333; margin-bottom: 10px; }
        .card { border: 1px solid #ffd700; padding: 10px; background: #050500; }
        #log { height: 120px; overflow-y: auto; font-size: 11px; border: 1px solid #222; margin-bottom: 10px; padding: 5px; }
        input { background: #000; border: 1px solid #ffd700; color: #fff; padding: 10px; width: 65%; outline: none; }
        button { background: #ffd700; color: #000; border: none; padding: 10px; font-weight: bold; width: 30%; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <span>[ ENG_UNIT ]</span>
        <a href="dashboard.html" style="color:#ffd700; text-decoration:none;">[ EXIT ]</a>
    </div>
    <div id="render"></div>
    <div class="card">
        <div id="log">/ 3D_ENGINE_ACTIVE.</div>
        <div style="display:flex; justify-content:space-between;">
            <input type="text" id="q" placeholder="ЗАДАЧА...">
            <button onclick="calc()">EXE</button>
        </div>
    </div>
    <script>
        let s, c, r, m;
        function init() {
            s = new THREE.Scene();
            c = new THREE.PerspectiveCamera(75, window.innerWidth/200, 0.1, 1000);
            r = new THREE.WebGLRenderer({antialias:true, alpha:true});
            r.setSize(window.innerWidth-20, 200);
            document.getElementById('render').appendChild(r.domElement);
            m = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshBasicMaterial({color:0xffd700, wireframe:true}));
            s.add(m); c.position.z = 5; animate();
        }
        function animate() { requestAnimationFrame(animate); m.rotation.x+=0.01; m.rotation.y+=0.01; r.render(s,c); }
        async function calc() {
            const q = document.getElementById('q'); const l = document.getElementById('log');
            l.innerHTML += `<div>> ${q.value}</div>`;
            try {
                const res = await fetch("https://api.airforce/chat/completions", {
                    method: "POST", headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({model:"llama-3-70b-instruct", messages:[{role:"system",content:"Ты инженер-механик."}, {role:"user",content:q.value}]})
                });
                const d = await res.json();
                l.innerHTML += `<div style="color:#fff">AI: ${d.choices[0].message.content}</div>`;
            } catch(e) { l.innerHTML += `<div>ERROR</div>`; }
            q.value = ""; l.scrollTop = l.scrollHeight;
        }
        window.onload = init;
    </script>
</body>
</html>
