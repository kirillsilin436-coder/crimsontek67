<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIMSONTEK // SOPROMAT_3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --crimson: #ff003c;
            --bg: #050505;
            --panel: rgba(20, 20, 20, 0.9);
        }
        body { 
            background: var(--bg); 
            color: var(--crimson); 
            font-family: 'JetBrains Mono', monospace; 
            margin: 0; padding: 15px;
            text-transform: uppercase;
        }
        #render { 
            width: 100%; height: 250px; 
            border: 1px solid var(--crimson); 
            margin-bottom: 15px; 
            background: radial-gradient(circle, #1a0005 0%, #050505 100%);
        }
        .card { 
            border: 1px solid var(--crimson); 
            padding: 15px; 
            background: var(--panel); 
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.2);
        }
        #log { 
            height: 150px; overflow-y: auto; 
            font-size: 11px; color: #fff;
            border-bottom: 1px solid #333; 
            margin-bottom: 10px; padding: 5px; 
            background: #000;
        }
        .input-group { display: flex; gap: 10px; }
        input { 
            flex: 1; background: #000; 
            border: 1px solid var(--crimson); 
            color: #fff; padding: 12px; outline: none; 
        }
        button { 
            background: var(--crimson); color: #fff; 
            border: none; padding: 12px 20px; 
            font-weight: bold; cursor: pointer;
        }
        .header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; }
        a { color: var(--crimson); text-decoration: none; border-bottom: 1px solid var(--crimson); }
    </style>
</head>
<body>
    <div class="header">
        <span>[ MODULE: ENG_UNIT_3D ]</span>
        <a href="index.html">[ EXIT_TO_HUB ]</a>
    </div>

    <div id="render"></div>

    <div class="card">
        <div id="log">/ 3D_ENGINE_ACTIVE. Введите задачу для расчета прочности...</div>
        <div class="input-group">
            <input type="text" id="q" placeholder="НАПРИМЕР: РАСЧЕТ БАЛКИ 10М...">
            <button onclick="calc()">EXE</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, object;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / 250, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth - 30, 250);
            document.getElementById('render').appendChild(renderer.domElement);

            // Создаем более сложную фигуру (Тор-узел) для "инженерного" вида
            const geometry = new THREE.TorusKnotGeometry(1.5, 0.4, 100, 16);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0xff003c, 
                wireframe: true,
                transparent: true,
                opacity: 0.8
            });
            object = new THREE.Mesh(geometry, material);
            scene.add(object);

            camera.position.z = 5;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            object.rotation.x += 0.005;
            object.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        async function calc() {
            const q = document.getElementById('q');
            const l = document.getElementById('log');
            if(!q.value) return;

            l.innerHTML += `<div style="color:#ff003c">> ${q.value}</div>`;
            const userQuery = q.value;
            q.value = "АНАЛИЗ...";

            try {
                const res = await fetch("https://api.airforce/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3-70b-instruct",
                        messages: [
                            { role: "system", content: "Ты инженер-механик CRIMSONTEK. Давай короткие технические ответы по сопромату." },
                            { role: "user", content: userQuery }
                        ]
                    })
                });
                
                if (!res.ok) throw new Error('API_OFFLINE');
                
                const d = await res.json();
                l.innerHTML += `<div style="color:#00f3ff">AI: ${d.choices[0].message.content}</div>`;
                
                // Эффект "нагрузки" на 3D модель при ответе
                object.material.color.setHex(0x00f3ff);
                setTimeout(() => object.material.color.setHex(0xff003c), 1000);

            } catch (e) {
                l.innerHTML += `<div style="color:yellow">ПРЕДУПРЕЖДЕНИЕ: СЕРВЕР РАСЧЕТОВ ПЕРЕГРУЖЕН. ИСПОЛЬЗУЙТЕ ЛОКАЛЬНЫЙ РЕЖИМ.</div>`;
            }
            
            q.value = "";
            l.scrollTop = l.scrollHeight;
        }

        window.onload = init;
        window.onresize = () => {
            camera.aspect = window.innerWidth / 250;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 30, 250);
        };
    </script>
</body>
</html>
