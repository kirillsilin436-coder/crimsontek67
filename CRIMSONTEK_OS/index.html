<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIMSONTEK // ACCESS</title>
    <link rel="stylesheet" href="crimson-theme.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 16px; }
        .login-box {
            border: 2px solid var(--ct-red);
            padding: 28px;
            background: var(--ct-bg2);
            box-shadow: var(--ct-glow-lg);
            text-align: center;
            width: 100%;
            max-width: 380px;
            position: relative;
            z-index: 1;
        }
        .tabs { display: flex; margin-bottom: 18px; border: 1px solid rgba(255, 0, 51, 0.35); }
        .tabs button {
            flex: 1; padding: 12px; background: var(--ct-bg); color: var(--ct-muted); border: none;
            font-family: inherit; font-weight: bold; cursor: pointer; font-size: 0.78rem; text-transform: uppercase;
        }
        .tabs button.on { background: var(--ct-organic); color: var(--ct-flash); box-shadow: inset 0 0 20px rgba(255, 0, 51, 0.15); }
        input {
            background: var(--ct-bg); border: 1px solid var(--ct-red-dark); color: var(--ct-text); padding: 14px; width: 100%; margin-bottom: 12px;
            outline: none; box-sizing: border-box; font-family: inherit; font-size: 1rem;
        }
        .hint { font-size: 0.72rem; color: var(--ct-text2); text-align: left; margin: -8px 0 12px 0; text-transform: none; line-height: 1.4; }
        .go { background: var(--ct-red); color: #050505; border: none; padding: 14px; width: 100%; font-weight: bold; cursor: pointer; font-family: inherit; text-transform: uppercase; font-size: 0.95rem; box-shadow: var(--ct-glow); }
        .sub { margin-top: 14px; font-size: 0.72rem; color: var(--ct-muted); text-transform: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="margin:0 0 6px 0;font-size:14px;letter-spacing:3px;color:var(--ct-flash);">GHOST-LINK // ACCESS</h2>
        <p style="margin:0 0 14px 0;font-size:0.65rem;letter-spacing:0.2em;color:var(--ct-text2);">CRIMSONTEK INDUSTRIES</p>
        <div class="tabs" id="tabs">
            <button type="button" class="on" data-mode="reg">РЕГИСТРАЦИЯ</button>
            <button type="button" data-mode="login">ВХОД</button>
        </div>

        <input type="text" id="user" placeholder="ЛОГИН (OPERATOR_ID)" autocomplete="username">
        <input type="password" id="pass" placeholder="ПАРОЛЬ" autocomplete="current-password">

        <div id="reg-extra">
            <input type="tel" id="phone" placeholder="ТЕЛЕФОН (+7...)" autocomplete="tel">
            <p class="hint">После регистрации — биометрия и переход в HUB. Данные сессии уходят в Telegram (учётная запись).</p>
        </div>

        <button type="button" class="go" onclick="submitAuth()">ПОДТВЕРДИТЬ</button>
        <p class="sub">Локальное хранение пароля в браузере (демо)</p>
    </div>

    <script src="crimson-config.js"></script>
    <script>
        let mode = 'reg';

        document.getElementById('tabs').addEventListener('click', function (e) {
            const b = e.target.closest('button[data-mode]');
            if (!b) return;
            mode = b.getAttribute('data-mode');
            document.querySelectorAll('#tabs button').forEach(x => x.classList.toggle('on', x === b));
            document.getElementById('reg-extra').style.display = mode === 'reg' ? 'block' : 'none';
        });

        function submitAuth() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            const phone = (document.getElementById('phone').value || '').trim();

            if (!u || !p) {
                alert('УКАЖИТЕ ЛОГИН И ПАРОЛЬ');
                return;
            }

            if (mode === 'reg') {
                if (!phone) {
                    alert('УКАЖИТЕ ТЕЛЕФОН ДЛЯ РЕГИСТРАЦИИ');
                    return;
                }
                localStorage.setItem('c_user', u);
                localStorage.setItem('c_pass', p);
                localStorage.setItem('crimson_phone', phone);
                localStorage.setItem('c_verified', 'false');

                const msg = crimsonFormatDossier('🔐 CRIMSONTEK — РЕГИСТРАЦИЯ ОПЕРАТОРА', {
                    login: u,
                    phone: phone,
                    event: 'НОВАЯ УЧЁТНАЯ ЗАПИСЬ',
                    note: 'Ожидается прохождение BIO_SCAN.'
                });
                crimsonSendTelegramHtml(msg);

                window.location.href = 'bio_scan.html';
                return;
            }

            if (u !== localStorage.getItem('c_user') || p !== localStorage.getItem('c_pass')) {
                alert('ОШИБКА: НЕВЕРНЫЙ ЛОГИН ИЛИ ПАРОЛЬ');
                return;
            }

            const msgIn = crimsonFormatDossier('✅ CRIMSONTEK — ВХОД В СИСТЕМУ', {
                login: u,
                phone: localStorage.getItem('crimson_phone') || '—',
                event: 'АВТОРИЗАЦИЯ',
                note: localStorage.getItem('c_verified') === 'true' ? 'Верифицирован ранее.' : 'Требуется биометрия.'
            });
            crimsonSendTelegramHtml(msgIn);

            if (localStorage.getItem('c_verified') === 'true') {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'bio_scan.html';
            }
        }
    </script>
</body>
</html>
