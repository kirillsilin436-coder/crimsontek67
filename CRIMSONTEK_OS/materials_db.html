<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRIMSONTEK // MATERIALS_DB</title>
  <link rel="stylesheet" href="crimson-theme.css">
  <style>
    body { margin: 0; padding: 14px; max-width: 960px; margin-left: auto; margin-right: auto; }
    h1 { font-family: 'Orbitron', sans-serif; font-size: 1rem; letter-spacing: 0.2em; color: var(--ct-red); margin: 0 0 12px 0; }
    .bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
    input[type="search"] {
      flex: 1; min-width: 200px; background: var(--ct-bg); border: 1px solid var(--ct-red-dark);
      color: var(--ct-text); padding: 10px; font-family: inherit;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; color: var(--ct-text); }
    th, td { border: 1px solid #222; padding: 8px 10px; text-align: left; }
    th { background: var(--ct-bg3); color: var(--ct-flash); font-weight: 600; text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.08em; }
    tr:nth-child(even) { background: rgba(26, 0, 0, 0.25); }
    .note { color: var(--ct-text2); font-size: 0.8rem; margin-bottom: 16px; text-transform: none; line-height: 1.5; }
    a { color: var(--ct-neon-soft); }
  </style>
</head>
<body>
  <h1>БАЗА МАТЕРИАЛОВ · УЧЕБНЫЙ СПРАВОЧНИК</h1>
  <p class="note">Типовые значения (порядок величин) для подбора и учёта. Уточняйте по ГОСТ для проектов.</p>
  <div class="bar">
    <input type="search" id="q" placeholder="Поиск: сталь, марка, ГОСТ…" autocomplete="off">
  </div>
  <div style="overflow-x:auto;">
    <table id="tbl">
      <thead>
        <tr>
          <th>Материал</th>
          <th>σт / σ0,2, МПа</th>
          <th>E, ГПа</th>
          <th>ρ, кг/м³</th>
          <th>Примечание</th>
        </tr>
      </thead>
      <tbody id="body"></tbody>
    </table>
  </div>
  <p style="margin-top:20px;"><a href="calc_hub.html">← РАСЧЁТНЫЙ ЦЕНТР</a> · <a href="dashboard.html">HUB</a></p>

  <script>
    if (localStorage.getItem('c_verified') !== 'true') location.href = 'index.html';

    var DATA = [
      { m: 'Сталь 20 (норм.)', s: '245–255', e: '206', r: '7850', n: 'Конструкционная' },
      { m: 'Сталь 45', s: '355', e: '200', r: '7850', n: 'Улучшаемая' },
      { m: 'Сталь 40Х', s: '785', e: '200', r: '7820', n: 'После ЗК' },
      { m: 'Сталь 09Г2С', s: '345', e: '200', r: '7850', n: 'Сварные конструкции' },
      { m: 'Сталь 65Г', s: '785', e: '200', r: '7850', n: 'Пружинная' },
      { m: 'Алюминий АД31', s: '195–295', e: '69', r: '2700', n: 'Зависит от состояния' },
      { m: 'Дюраль Д16', s: '275–480', e: '71', r: '2800', n: 'Закалка' },
      { m: 'Медь М1', s: '200–250', e: '110–130', r: '8900', n: 'Прокат' },
      { m: 'Латунь Л63', s: '200–350', e: '100–110', r: '8440', n: 'Полуфабрикат' },
      { m: 'Титан ВТ1-0', s: '345–490', e: '110', r: '4500', n: 'α-сплав' },
      { m: 'Чугун СЧ 20', s: '320', e: '100–140', r: '7200', n: 'Серый' },
      { m: 'Стеклопластик (стекломат)', s: '200–400*', e: '15–35', r: '1800–2000', n: '*анизотропия' }
    ];

    function render(filter) {
      var f = (filter || '').toLowerCase();
      var rows = DATA.filter(function (x) {
        if (!f) return true;
        return (x.m + x.n + x.s).toLowerCase().indexOf(f) >= 0;
      });
      document.getElementById('body').innerHTML = rows.map(function (x) {
        return '<tr><td>' + x.m + '</td><td>' + x.s + '</td><td>' + x.e + '</td><td>' + x.r + '</td><td>' + x.n + '</td></tr>';
      }).join('');
    }
    document.getElementById('q').addEventListener('input', function () { render(this.value); });
    render('');
  </script>
</body>
</html>
