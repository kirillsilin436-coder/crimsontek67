<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRIMSONTEK // CALC · ГИДРАВЛИКА</title>
  <link rel="stylesheet" href="crimson-theme.css">
  <style>
    body { margin: 0; padding: 14px; max-width: 480px; margin-left: auto; margin-right: auto; }
    h1 { font-size: 0.95rem; color: var(--ct-red); font-family: Orbitron, sans-serif; letter-spacing: 0.12em; }
    label { display: block; color: var(--ct-text2); font-size: 0.8rem; margin: 12px 0 4px 0; text-transform: none; }
    input {
      width: 100%; box-sizing: border-box; padding: 10px; background: var(--ct-bg); border: 1px solid var(--ct-red-dark);
      color: var(--ct-text); font-family: inherit;
    }
    button { margin-top: 16px; padding: 12px 20px; background: var(--ct-red); color: #050505; border: none; font-weight: 700; cursor: pointer; box-shadow: var(--ct-glow); width: 100%; }
    #out { margin-top: 18px; padding: 14px; background: var(--ct-bg2); border: 1px solid #333; color: var(--ct-flash); font-size: 1.05rem; text-transform: none; }
    .hint { font-size: 0.78rem; color: var(--ct-muted); text-transform: none; margin-top: 12px; line-height: 1.45; }
    a { color: var(--ct-neon-soft); }
  </style>
</head>
<body>
  <h1>РАСХОД · Q = v · A</h1>
  <p class="hint">v — средняя скорость потока (м/с). A — площадь живого сечения (м²). Q — м³/с.</p>
  <label for="v">v, м/с</label>
  <input type="number" id="v" step="any" placeholder="2">
  <label for="a">A, м²</label>
  <input type="number" id="a" step="any" placeholder="0.01">
  <button type="button" onclick="calc()">СЧИТАТЬ</button>
  <div id="out"></div>
  <p class="hint">Потери давления и КПД — отдельные модули позже. <a href="calc_hub.html">← центр</a></p>

  <script>
    if (localStorage.getItem('c_verified') !== 'true') location.href = 'index.html';
    function calc() {
      var v = parseFloat(document.getElementById('v').value);
      var a = parseFloat(document.getElementById('a').value);
      if (!a || a <= 0 || !isFinite(v)) {
        document.getElementById('out').textContent = 'Проверьте ввод.';
        return;
      }
      var Q = v * a;
      var Ql = Q * 1000;
      document.getElementById('out').innerHTML =
        'Q = <strong>' + Q.toExponential(4) + '</strong> м³/с<br>' +
        '(≈ ' + Ql.toFixed(4) + ' л/с)';
    }
  </script>
</body>
</html>
