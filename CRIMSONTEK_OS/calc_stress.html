<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRIMSONTEK // CALC · ИЗГИБ</title>
  <link rel="stylesheet" href="crimson-theme.css">
  <style>
    body { margin: 0; padding: 14px; max-width: 480px; margin-left: auto; margin-right: auto; }
    h1 { font-size: 0.95rem; color: var(--ct-red); font-family: Orbitron, sans-serif; letter-spacing: 0.12em; }
    label { display: block; color: var(--ct-text2); font-size: 0.8rem; margin: 12px 0 4px 0; text-transform: none; }
    input {
      width: 100%; box-sizing: border-box; padding: 10px; background: var(--ct-bg); border: 1px solid var(--ct-red-dark);
      color: var(--ct-text); font-family: inherit;
    }
    button { margin-top: 16px; padding: 12px 20px; background: var(--ct-red); color: #050505; border: none; font-weight: 700; cursor: pointer; box-shadow: var(--ct-glow); width: 100%; }
    #out { margin-top: 18px; padding: 14px; background: var(--ct-bg2); border: 1px solid #333; color: var(--ct-flash); font-size: 1.1rem; text-transform: none; }
    .hint { font-size: 0.78rem; color: var(--ct-muted); text-transform: none; margin-top: 12px; line-height: 1.45; }
    a { color: var(--ct-neon-soft); }
  </style>
</head>
<body>
  <h1>ИЗГИБ · σ = M / Wz</h1>
  <p class="hint">M — изгибающий момент (Н·м). Wz — модуль сопротивления (мм³). Результат — напряжение в МПа.</p>
  <label for="m">M, Н·м</label>
  <input type="number" id="m" step="any" placeholder="например 5000">
  <label for="w">Wz, мм³</label>
  <input type="number" id="w" step="any" placeholder="например 50000">
  <button type="button" onclick="calc()">СЧИТАТЬ</button>
  <div id="out"></div>
  <p class="hint"><a href="calc_hub.html">← расчётный центр</a></p>

  <script>
    if (localStorage.getItem('c_verified') !== 'true') location.href = 'index.html';
    function calc() {
      var M = parseFloat(document.getElementById('m').value);
      var W = parseFloat(document.getElementById('w').value);
      if (!W || W <= 0 || !isFinite(M)) {
        document.getElementById('out').textContent = 'Проверьте ввод.';
        return;
      }
      var M_Nmm = M * 1e6;
      var sigma = M_Nmm / W;
      document.getElementById('out').innerHTML = 'σ = <strong>' + sigma.toFixed(2) + '</strong> МПа';
    }
  </script>
</body>
</html>
