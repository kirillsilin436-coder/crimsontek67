<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ Разрешен</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 40px;
            box-shadow: 0 0 20px #00ff00;
        }
        .checkmark {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            letter-spacing: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="checkmark">✓</div>
        <h1>Доступ Разрешен</h1>
        <p>Биометрическая проверка пройдена успешно.</p>
        <p id="timer">Переход в терминал через 3...</p>
    </div>

    <script>
        // Автоматический переход на dashboard.html через 3 секунды
        let count = 3;
        const timerElement = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            count--;
            timerElement.innerText = `Переход в терминал через ${count}...`;
            if (count <= 0) {
                clearInterval(countdown);
                window.location.href = 'dashboard.html';
            }
        }, 1000);
    </script>
</body>
</html>
