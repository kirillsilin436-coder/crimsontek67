<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRIMSONTEK // HUB ACCESS</title>
  <style>
    body {
      background-color: #000;
      color: #00ff00;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .access-box {
      border: 1px solid #00ff00;
      padding: 40px;
      background: rgba(0, 20, 0, 0.2);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
    }
    .check { font-size: 5rem; margin-bottom: 10px; }
    h1 { letter-spacing: 3px; font-size: 1.5rem; }
    .btn-enter {
      margin-top: 30px;
      display: inline-block;
      padding: 15px 30px;
      border: 1px solid #00ff00;
      color: #00ff00;
      text-decoration: none;
      text-transform: uppercase;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-enter:hover {
      background: #00ff00;
      color: #000;
    }
    #status { font-size: 0.8rem; color: #008800; margin-top: 15px; }
  </style>
</head>
<body>

  <div class="access-box">
    <div class="check">✓</div>
    <h1>ДОСТУП РАЗРЕШЁН</h1>
    <p>Личность подтверждена. Добро пожаловать в Hub.</p>
    
    <a href="dashboard.html" class="btn-enter">Войти в Сообщество</a>
    
    <div id="status">Инициализация защищенного канала...</div>
  </div>

  <script>
    // Автоматический переход в Hub через 2.5 секунды
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 2500);
  </script>

</body>
</html>
